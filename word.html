  let currentSet={}, currentLang='zh', showImage=true, currentWords=[], currentImgNames=[], currentIndex=0, currentLevelName="";
  
  function setMode(mode, img) {
    showImage = img;
    if(mode === 'zh_jr') { currentSet = jrZh; currentLang = 'zh'; }
    else if(mode === 'en_jr') { currentSet = jrEn; currentLang = 'en'; }
    else if(mode === 'zh_mid') { currentSet = midZh; currentLang = 'zh'; }
    else if(mode === 'en_mid') { currentSet = midEn; currentLang = 'en'; }
    else if(mode === 'zh_adv') { currentSet = advZh; currentLang = 'zh'; }
    else if(mode === 'en_adv') { currentSet = advEn; currentLang = 'en'; }

    document.getElementById('mode-title').innerText = mode.includes('zh') ? "中文版" : "英文版";
    document.getElementById('mode-page').classList.remove('active');
    document.getElementById('level-page').classList.add('active');
    const menu = document.getElementById('level-menu'); menu.innerHTML = "";
    Object.keys(currentSet).forEach(lvl => {
      let btn = document.createElement('button'); btn.className = 'level-btn'; btn.innerText = lvl; btn.onclick = () => startLevel(lvl); menu.appendChild(btn);
    });
  }

  function startLevel(lvl) {
    currentLevelName = lvl;
    // 隨機打亂索引
    let indices = Array.from({length: currentSet[lvl].length}, (_, i) => i).sort(() => Math.random() - 0.5);
    
    // 確保單字與對應圖片的邏輯正確連接，修正了之前的抓取錯誤
    currentWords = indices.map(i => currentSet[lvl][i]);
    currentImgNames = indices.map(i => (currentSet === jrEn) ? jrZh[lvl][i] : currentSet[lvl][i]);
    currentIndex = 0;
    
    // 控制字體大小
    if (currentSet === advZh || currentSet === advEn) {
      document.getElementById('word-text').style.fontSize = "28px";
    } else {
      document.getElementById('word-text').style.fontSize = "50px";
    }

    document.getElementById('level-page').classList.remove('active');
    document.getElementById('game-page').classList.add('active'); update();
  }

  function update() {
    document.getElementById('info-bar').innerText = `${currentLevelName} (${currentIndex+1}/${currentWords.length})`;
    document.getElementById('word-text').innerText = currentWords[currentIndex];
    
    // 顯示對應圖片（限初級有圖片版）
    document.getElementById('img-area').innerHTML = (showImage && (currentSet === jrZh || currentSet === jrEn)) ? `<img src="${currentImgNames[currentIndex]}.jpg" style="width:100%;height:180px;object-fit:contain;">` : "";
    
    const vBox = document.getElementById('voice-btns');
    if(currentLang === 'zh') { 
      vBox.innerHTML = `<button class="v-btn" onclick="speak('zh-HK')">🔊 廣東話</button><button class="v-btn" onclick="speak('zh-CN')">🔊 普通話</button>`; 
    } else { 
      vBox.innerHTML = `<button class="v-btn" onclick="speak('en-US')">🔊 English</button>`; 
    }
  }

  function speak(langCode) { const u = new SpeechSynthesisUtterance(currentWords[currentIndex]); u.lang = langCode; window.speechSynthesis.speak(u); }
  function next() { if(currentIndex < currentWords.length - 1) { currentIndex++; update(); } else { alert("太棒了！關卡完成！"); goBackToLevels(); } }
  function prev() { if(currentIndex > 0) { currentIndex--; update(); } }
  function goBackToLevels() { document.getElementById('game-page').classList.remove('active'); document.getElementById('level-page').classList.add('active'); }
</script>
