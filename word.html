<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幼兒中英學習卡(粵普英發聲版)</title>
<style>
  :root { --primary: #FFB7B2; --secondary: #B2E2F2; --text: #555; }
  body { font-family: 'Comic Sans MS', cursive, sans-serif; background: #FFF9E1; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--text); }
  .logo { position: absolute; top: 10px; left: 10px; width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; }
  .page { display: none; flex-direction: column; align-items: center; width: 100%; flex-grow: 1; padding: 20px; box-sizing: border-box; }
  .active { display: flex; }
  h1 { color: #FF9AA2; text-align: center; font-size: 22px; margin-top: 40px; }
  .mode-btn { width: 95%; max-width: 400px; padding: 14px; margin: 5px; border-radius: 15px; border: none; background: white; font-size: 16px; font-weight: bold; box-shadow: 0 4px #FFDAC1; cursor: pointer; }
  .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; width: 100%; max-width: 400px; }
  .level-btn { padding: 12px; background: white; border: 2px solid var(--primary); border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: bold; }
  .card { background: white; padding: 20px; border-radius: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 300px; min-height: 250px; display: flex; flex-direction: column; justify-content: center; }
  .word { font-size: 50px; margin: 15px 0; color: #333; font-weight: bold; }
  .voice-box { display: flex; gap: 10px; margin: 20px 0; }
  .v-btn { padding: 10px 15px; border-radius: 15px; border: none; background: var(--secondary); font-weight: bold; cursor: pointer; font-size: 16px; }
  footer { background: white; width: 100%; padding: 15px 10px; text-align: center; border-top: 4px solid var(--secondary); font-size: 11px; margin-top: auto; line-height: 1.6; }
  footer a { color: #FF9AA2; text-decoration: none; font-weight: bold; margin: 0 5px; }
</style>
</head>
<body>

<img src="cat.jpeg" class="logo">

<div id="mode-page" class="page active">
  <h1>🌟 幼兒中英學習卡(粵普英發聲版) 🌟</h1>
  <button class="mode-btn" onclick="setMode('zh_jr', true)" style="background:#FFDAC1">初級版中文(K1-K2有圖片)</button>
  <button class="mode-btn" onclick="setMode('zh_jr', false)" style="background:#FFEDD5">初級版中文(K1-K2沒有圖片)</button>
  <button class="mode-btn" onclick="setMode('en_jr', true)" style="background:#B2E2F2">初級版英文(K1-K2有圖片)</button>
  <button class="mode-btn" onclick="setMode('en_jr', false)" style="background:#E0F2FE">初級版英文(K1-K2沒有圖片)</button>
  <button class="mode-btn" onclick="setMode('zh_mid', false)" style="background:#FEE2E2">中級版中文(K2-K3)</button>
  <button class="mode-btn" onclick="setMode('en_mid', false)" style="background:#DBEAFE">中級版英文(K2-K3)</button>
</div>

<div id="level-page" class="page">
  <h2 id="mode-title" style="color:#FF9AA2"></h2>
  <div class="level-grid" id="level-menu"></div>
  <button onclick="location.reload()" style="margin-top:20px;">⬅️ 返回主頁</button>
</div>

<div id="game-page" class="page">
  <div id="info-bar" style="background:var(--secondary); padding:5px 20px; border-radius:20px; margin-bottom:10px; font-weight:bold;"></div>
  <div class="card"><div id="img-area"></div><div class="word" id="word-text"></div></div>
  <div class="voice-box" id="voice-btns"></div>
  <div style="display:flex; gap:10px;">
    <button onclick="prev()" style="padding:10px 20px; border-radius:10px; border:none; background:#FFDAC1;">⬅️</button>
    <button onclick="goBackToLevels()" style="padding:10px 15px; border-radius:10px; border:none; background:#eee;">🏠</button>
    <button onclick="next()" style="padding:10px 20px; border-radius:10px; border:none; background:#FFDAC1;">➡️</button>
  </div>
</div>

<footer>
  <strong>Teacher Cat 的快樂AI教室</strong><br>

  <a href="https://chat.whatsapp.com/Jj4ny1yzFz1D2Ljzccw6ni" target="_blank">WhatsApp Group</a> | 
  抖音號: 74254902683
</footer>

<script>
  // 資料集
  const jrZh = { "第一關：家人與家居": ["媽媽","爸爸","哥哥","姐姐","弟弟","妹妹","爺爺","奶奶","家","門","窗","椅子","桌子","燈","床","玩具","娃娃","積木","書","球"], "第二關：數字與顏色": ["一","二","三","四","五","六","七","八","九","十","紅","藍","黃","綠","白","黑","橙","粉紅","灰","彩虹"], "第三關：動物與自然": ["狗","貓","鳥","魚","兔子","熊","猴子","太陽","月亮","星星","雲","雨","風","樹","花","草","山","河","葉子","蝴蝶"], "第四關：身體與動作": ["頭","眼睛","鼻子","嘴巴","耳朵","手","腳","牙齒","跑","跳","走","唱","畫","吃","喝","笑","哭","抱","洗手","睡覺"], "第五關：食物與日常用品": ["蘋果","香蕉","橙子","西瓜","葡萄","餅乾","麵包","牛奶","飯","蛋","糖果","水","茶","碗","筷子","衣服","鞋子","帽子","公車","幼稚園"] };
  const jrEn = { "第一關：家人與家居": ["Mother","Father","Brother","Sister","Brother","Sister","Grandpa","Grandma","Home","Door","Window","Chair","Table","Lamp","Bed","Toy","Doll","Blocks","Book","Ball"], "第二關：數字與顏色": ["One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Red","Blue","Yellow","Green","White","Black","Orange","Pink","Grey","Rainbow"], "第三關：動物與自然": ["Dog","Cat","Bird","Fish","Rabbit","Bear","Monkey","Sun","Moon","Star","Cloud","Rain","Wind","Tree","Flower","Grass","Mountain","River","Leaf","Butterfly"], "第四關：身體與動作": ["Head","Eyes","Nose","Mouth","Ears","Hand","Foot","Teeth","Run","Jump","Walk","Sing","Draw","Eat","Drink","Smile","Cry","Hug","Wash Hands","Sleep"], "第五關：食物與日常用品": ["Apple","Banana","Orange","Watermelon","Grapes","Biscuit","Bread","Milk","Rice","Egg","Candy","Water","Tea","Bowl","Chopsticks","Clothes","Shoes","Hat","Bus","Kindergarten"] };
  const midZh = { "1,時間與季節": ["春天","夏天","秋天","冬天","早上","中午","晚上","明天","昨天","今天","星期","時鐘","遲到","早安","晚安","季節","暖和","涼爽","寒冷","炎熱"], "2,交通與地點": ["學校","公園","超市","書店","醫院","銀行","機場","車站","街道","紅綠燈","過馬路","地鐵","計程車","飛機","火車","腳踏車","駕駛","附近","方向","遠近"], "3,情緒與性格": ["開心","傷心","生氣","害怕","驚訝","著急","害羞","溫柔","勇敢","誠實","認真","聰明","可愛","活潑","無聊","討厭","喜歡","難過","冷靜","體貼"], "4,學校與學習": ["老師","同學","教室","課本","鉛筆","橡皮擦","筆記本","畫畫","寫字","閱讀","計算","考試","作業","成績","報告","知識","興趣","分組","討論","專心"], "5,服裝與外貌": ["襯衫","褲子","裙子","外套","毛衣","襪子","眼鏡","長髮","短髮","高矮","胖瘦","漂亮","帥氣","整潔","乾淨","骯髒","裝扮","試穿","拉鍊","口袋"], "6,家務與生活": ["打掃","煮飯","洗碗","洗衣","摺疊","整理","垃圾","回收","修理","照顧","洗澡","刷牙","梳頭","剪指甲","擦地","拖地","澆花","飼養","幫忙","習慣"], "7,自然與環境": ["大海","沙灘","森林","草原","沙漠","地圖","地球","國家","城市","鄉下","空氣","污染","保護","珍惜","資源","寶石","植物","昆蟲","野生","奇妙"], "8,飲食與禮儀": ["早餐","午餐","晚餐","點心","蔬菜","水果","味道","甜味","鹹味","酸味","苦味","健康","營養","胃口","餐具","邀請","禮貌","分享","感謝","道歉"], "9,動作與能力": ["學習","練習","準備","進行","發現","尋找","觀察","解釋","分析","幫助","支持","保護","決定","嘗試","開始","完成","運動","比賽","跳舞","游泳"], "10,社會與願望": ["朋友","家人","鄰居","客人","警察","醫生","工程師","農夫","職業","夢想","目標","成長","將來","世界","和平","文化","節日","禮物","活動","旅遊"] };
  const midEn = { "1,Time & Seasons": ["Spring","Summer","Autumn","Winter","Morning","Noon","Night","Tomorrow","Yesterday","Today","Week","Clock","Late","Good morning","Good night","Season","Warm","Cool","Cold","Hot"], "2,Transport & Places": ["School","Park","Supermarket","Bookstore","Hospital","Bank","Airport","Station","Street","Traffic light","Cross the road","Subway","Taxi","Airplane","Train","Bicycle","Drive","Nearby","Direction","Distance"], "3,Emotions & Traits": ["Happy","Sad","Angry","Afraid","Surprised","Worried","Shy","Gentle","Brave","Honest","Serious","Smart","Cute","Active","Bored","Dislike","Like","Upset","Calm","Thoughtful"], "4,School & Study": ["Teacher","Classmate","Classroom","Textbook","Pencil","Eraser","Notebook","Draw","Write","Read","Calculate","Exam","Homework","Grade","Report","Knowledge","Interest","Group","Discuss","Focus"], "5,Clothing & Appearance": ["Shirt","Pants","Skirt","Jacket","Sweater","Socks","Glasses","Long hair","Short hair","Tall/Short","Fat/Thin","Beautiful","Handsome","Neat","Clean","Dirty","Dress up","Try on","Zipper","Pocket"], "6,Chores & Life": ["Clean","Cook","Wash dishes","Laundry","Fold","Organize","Trash","Recycle","Fix","Take care","Shower","Brush teeth","Comb hair","Cut nails","Mop","Sweep","Water plants","Feed","Help","Habit"], "7,Nature & Environment": ["Ocean","Beach","Forest","Grassland","Desert","Map","Earth","Country","City","Countryside","Air","Pollution","Protect","Treasure","Resource","Gem","Plant","Insect","Wild","Wonderful"], "8,Food & Etiquette": ["Breakfast","Lunch","Dinner","Snack","Vegetable","Fruit","Taste","Sweet","Salty","Sour","Bitter","Healthy","Nutritious","Appetite","Tableware","Invite","Polite","Share","Thank you","Apologize"], "9,Actions & Abilities": ["Learn","Practice","Prepare","Proceed","Discover","Look for","Observe","Explain","Analyze","Help","Support","Protect","Decide","Try","Start","Finish","Exercise","Compete","Dance","Swim"], "10,Society & Wishes": ["Friend","Family","Neighbor","Guest","Police officer","Doctor","Engineer","Farmer","Occupation","Dream","Goal","Grow up","Future","World","Peace","Culture","Festival","Gift","Activity","Travel"] };

  let currentSet={}, currentLang='zh', showImage=true, currentWords=[], currentImgNames=[], currentIndex=0, currentLevelName="";

  function setMode(mode, img) {
    showImage = img;
    if(mode === 'zh_jr') { currentSet = jrZh; currentLang = 'zh'; document.getElementById('mode-title').innerText = "初級中文(K1-K2)"; }
    else if(mode === 'en_jr') { currentSet = jrEn; currentLang = 'en'; document.getElementById('mode-title').innerText = "初級英文(K1-K2)"; }
    else if(mode === 'zh_mid') { currentSet = midZh; currentLang = 'zh'; document.getElementById('mode-title').innerText = "中級中文(K2-K3)"; }
    else { currentSet = midEn; currentLang = 'en'; document.getElementById('mode-title').innerText = "中級英文(K2-K3)"; }
    
    document.getElementById('mode-page').classList.remove('active');
    document.getElementById('level-page').classList.add('active');
    const menu = document.getElementById('level-menu'); menu.innerHTML = "";
    Object.keys(currentSet).forEach(lvl => {
      let btn = document.createElement('button'); btn.className = 'level-btn'; btn.innerText = lvl; btn.onclick = () => startLevel(lvl); menu.appendChild(btn);
    });
  }

  function startLevel(lvl) {
    currentLevelName = lvl;
    let indices = Array.from({length: currentSet[lvl].length}, (_, i) => i).sort(() => Math.random() - 0.5);
    currentWords = indices.map(i => currentSet[lvl][i]);
    currentImgNames = indices.map(i => (currentSet === jrEn) ? jrZh[lvl][i] : currentSet[lvl][i]);
    currentIndex = 0;
    document.getElementById('level-page').classList.remove('active');
    document.getElementById('game-page').classList.add('active');
    update();
  }

  function update() {
    document.getElementById('info-bar').innerText = `${currentLevelName} (${currentIndex+1}/${currentWords.length})`;
    document.getElementById('word-text').innerText = currentWords[currentIndex];
    document.getElementById('img-area').innerHTML = showImage ? `<img src="${currentImgNames[currentIndex]}.jpg" style="width:100%;height:180px;object-fit:contain;">` : "";
    
    const vBox = document.getElementById('voice-btns');
    if(currentLang === 'zh') {
      vBox.innerHTML = `<button class="v-btn" onclick="speak('zh-HK')">🔊 廣東話</button>
                        <button class="v-btn" onclick="speak('zh-CN')">🔊 普通話</button>`;
    } else {
      vBox.innerHTML = `<button class="v-btn" onclick="speak('en-US')">🔊 English</button>`;
    }
  }

  function speak(langCode) {
    const u = new SpeechSynthesisUtterance(currentWords[currentIndex]);
    u.lang = langCode; window.speechSynthesis.speak(u);
  }

  function next() { if(currentIndex < currentWords.length - 1) { currentIndex++; update(); } else { alert("太棒了！挑戰完成！"); goBackToLevels(); } }
  function prev() { if(currentIndex > 0) { currentIndex--; update(); } }
  function goBackToLevels() { document.getElementById('game-page').classList.remove('active'); document.getElementById('level-page').classList.add('active'); }
</script>
</body>
</html>
