<style>
    :root {
        --primary: #FF9A9E;
        --secondary: #FECFEF;
        --accent1: #A18CD1;
        --accent2: #FBC2EB;
        --bg: #FDFBFB;
        --text: #333;
        --correct: #84E896;
        --wrong: #FF6B6B;
    }
    body {
        margin: 0;
        font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', '微軟正黑體', sans-serif;
        background: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
    }
    
    /* 左上角圖標 */
    .top-logo {
        position: absolute;
        top: 15px;
        left: 15px;
        width: 70px;
        height: 70px;
        border-radius: 50%;
        border: 3px solid #fff;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        object-fit: cover;
        z-index: 1000;
        background-color: #fff;
    }

    header {
        text-align: center;
        padding: 20px;
        background: rgba(255,255,255,0.8);
        width: 100%;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        margin-bottom: 20px;
    }
    h1 {
        margin: 0;
        color: #5f2c82;
        font-size: 2.2rem;
        text-shadow: 2px 2px 0px #fff;
        padding-left: 60px;
    }
    .container {
        width: 90%;
        max-width: 800px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        text-align: center;
        transition: background-color 0.3s;
        margin-bottom: 30px;
    }
    
    /* 首頁選單 */
    .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 15px;
    }
    .level-btn {
        background: linear-gradient(135deg, var(--accent2), var(--accent1));
        color: white; border: none; padding: 15px; font-size: 1.1rem; font-weight: bold;
        border-radius: 15px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 4px 0 #7b62a3; display: flex; flex-direction: column; align-items: center;
        justify-content: center; line-height: 1.4;
    }
    .level-btn:hover { transform: translateY(-3px); box-shadow: 0 7px 0 #7b62a3; }
    .level-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #7b62a3; }
    
    /* 遊戲畫面 */
    #game-screen, #end-screen { display: none; }
    .status-bar { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: #555; }
    .difficulty-badge { background-color: #ffeaa7; padding: 5px 15px; border-radius: 20px; color: #d63031; }
    
    .question-container { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; min-height: 80px; }
    .question-box { font-size: 1.8rem; color: #2d3436; flex-grow: 1; }
    .tts-btn {
        background: #ffeaa7; border: none; border-radius: 50%; font-size: 1.5rem; width: 55px; height: 55px;
        cursor: pointer; box-shadow: 0 4px 0 #fdcb6e; transition: transform 0.1s; margin-left: 15px; flex-shrink: 0;
    }
    .tts-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #fdcb6e; }

    /* 文法提示框 CSS */
    .hint-box {
        display: none;
        background-color: #fff3cd;
        border-left: 6px solid #ffc107;
        color: #856404;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 8px;
        font-size: 1.2rem;
        text-align: left;
        animation: fadeIn 0.4s ease;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .hint-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        border-bottom: 1px dashed #e4c664;
        padding-bottom: 8px;
    }
    .hint-header b { color: #d35400; font-size: 1.3rem; }
    .hint-tts-btn { width: 45px; height: 45px; font-size: 1.2rem; margin-left: 0; }

    .options-grid { display: flex; flex-direction: column; gap: 15px; }
    .option-btn {
        background: #74b9ff; color: white; border: none; padding: 15px; font-size: 1.3rem;
        border-radius: 10px; cursor: pointer; box-shadow: 0 4px 0 #0984e3; transition: all 0.2s;
    }
    .option-btn:hover:not(:disabled) { background: #0984e3; }
    .option-btn:disabled { cursor: default; opacity: 0.9; }
    .correct { background: var(--correct) !important; box-shadow: 0 4px 0 #20bf6b !important; }
    .wrong { background: var(--wrong) !important; box-shadow: 0 4px 0 #eb3b5a !important; }
    
    .nav-bar { display: flex; justify-content: space-between; margin-top: 30px; border-top: 2px dashed #dfe6e9; padding-top: 20px; }
    .nav-btn {
        background: #a29bfe; color: white; border: none; padding: 12px 20px; border-radius: 10px;
        font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #6c5ce7; flex: 1; margin: 0 5px;
    }
    .nav-btn:hover:not(:disabled) { background: #6c5ce7; }
    .nav-btn:disabled { background: #b2bec3; box-shadow: 0 4px 0 #636e72; cursor: not-allowed; opacity: 0.7; }
    .nav-btn.home-btn { background: #ff7675; box-shadow: 0 4px 0 #d63031; }
    .nav-btn.home-btn:hover { background: #d63031; }

    /* 動畫區 */
    @keyframes correctPop { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
    @keyframes flashSuccess { 0% { background-color: rgba(255, 255, 255, 0.95); } 50% { background-color: #d1fae5; } 100% { background-color: rgba(255, 255, 255, 0.95); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; } 50% { transform: translateY(50vh) rotate(180deg) scale(1.5); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg) scale(1); opacity: 0; } }

    .correct-anim { animation: correctPop 0.4s ease; }
    .screen-success { animation: flashSuccess 0.6s ease; }
    .star-display { font-size: 4rem; margin: 20px 0; }
    .falling-star { position: fixed; top: -50px; z-index: 9999; pointer-events: none; animation: fall linear forwards; }
    .perfect-confetti { position: fixed; z-index: 10000; pointer-events: none; animation: confettiFall linear forwards; }

    /* 答題總結面板 */
    .summary-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; background: #f1f2f6; padding: 15px; border-radius: 15px; }
    .summary-item { padding: 10px 5px; border-radius: 8px; font-weight: bold; color: white; text-align: center; font-size: 1rem; }
    .summary-correct { background-color: #20bf6b; cursor: default; box-shadow: 0 4px 0 #1b9e58; }
    .summary-wrong { background-color: #eb3b5a; cursor: pointer; box-shadow: 0 4px 0 #b71540; transition: transform 0.1s; }
    .summary-wrong:active { transform: translateY(2px); box-shadow: 0 2px 0 #b71540; }
    @media (max-width: 600px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }

    /* Footer */
    footer { width: 100%; background: rgba(255, 255, 255, 0.9); text-align: center; padding: 15px 10px; margin-top: auto; box-shadow: 0 -4px 6px rgba(0,0,0,0.05); }
    footer p { margin: 0 0 10px 0; font-size: 1.2rem; font-weight: bold; color: #5f2c82; }
    .social-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
    .social-links a, .social-links span { text-decoration: none; color: white; background-color: #a29bfe; padding: 5px 15px; border-radius: 15px; font-size: 0.9rem; transition: background-color 0.2s; display: inline-block; }
    .social-links a:hover { background-color: #6c5ce7; }
    .social-links span { background-color: #ff7675; cursor: default; }
</style>

<script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = new AudioContext();

    function playCorrectSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
        osc.type = 'sine'; osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
        osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
        osc.start(); gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5); osc.stop(audioCtx.currentTime + 0.5);
    }

    function playWrongSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
        osc.type = 'sawtooth'; osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.start(); gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.4); osc.stop(audioCtx.currentTime + 0.4);
    }

    function playPerfectSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc1 = audioCtx.createOscillator(); const osc2 = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
        osc1.type = 'triangle'; osc2.type = 'sine';
        osc1.connect(gainNode); osc2.connect(gainNode); gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        osc1.frequency.setValueAtTime(523.25, now); osc1.frequency.setValueAtTime(659.25, now + 0.15); 
        osc1.frequency.setValueAtTime(783.99, now + 0.3); osc1.frequency.setValueAtTime(1046.50, now + 0.45); 
        osc2.frequency.setValueAtTime(523.25, now); osc2.frequency.setValueAtTime(659.25, now + 0.15);
        osc2.frequency.setValueAtTime(783.99, now + 0.3); osc2.frequency.setValueAtTime(1046.50, now + 0.45);
        osc1.start(now); osc2.start(now);
        gainNode.gain.setValueAtTime(0.5, now); gainNode.gain.exponentialRampToValueAtTime(0.00001, now + 1.5);
        osc1.stop(now + 1.5); osc2.stop(now + 1.5);
    }

    // 題目英文發音
    function speakText() {
        window.speechSynthesis.cancel();
        const cleanText = levelQuestions[currentQuestionIndex].q.replace(/__/g, "blank");
        const msg = new SpeechSynthesisUtterance(cleanText); 
        msg.lang = 'en-US'; 
        msg.rate = 0.9; 
        window.speechSynthesis.speak(msg);
    }

    // 新增：文法提示中文發音
    function speakHint() {
        window.speechSynthesis.cancel();
        const text = document.getElementById('hint-text').innerText;
        const msg = new SpeechSynthesisUtterance(text); 
        msg.lang = 'zh-HK'; // 設定為中文(香港)發音，確保小朋友聽得懂提示
        msg.rate = 0.9; 
        window.speechSynthesis.speak(msg);
    }

    function createFallingStars() {
        for (let i = 0; i < 40; i++) {
            let star = document.createElement("div"); star.innerHTML = "⭐"; star.className = "falling-star";
            star.style.left = Math.random() * 100 + "vw"; star.style.fontSize = (Math.random() * 2 + 1) + "rem";
            star.style.animationDuration = (Math.random() * 2 + 1.5) + "s";
            document.body.appendChild(star); setTimeout(() => { star.remove(); }, 4000);
        }
    }

    function createPerfectEffect() {
        const symbols = ['🎉', '🏆', '✨', '🎈', '🌟'];
        for (let i = 0; i < 80; i++) {
            let conf = document.createElement("div"); conf.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
            conf.className = "perfect-confetti"; conf.style.left = Math.random() * 100 + "vw"; conf.style.top = "-50px";
            conf.style.fontSize = (Math.random() * 2 + 1.5) + "rem"; conf.style.animationDuration = (Math.random() * 3 + 2) + "s";
            conf.style.animationDelay = (Math.random() * 0.5) + "s";
            document.body.appendChild(conf); setTimeout(() => { conf.remove(); }, 6000);
        }
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    let currentLevelId = 1; let currentQuestionIndex = 0; let levelQuestions = [];
    let userAnswers = {}; let isRetryMode = false;

    const menuGrid = document.getElementById('menu-grid');
    for (let i = 1; i <= 9; i++) {
        const btn = document.createElement('button'); btn.className = 'level-btn';
        btn.innerHTML = gameData[i].title; btn.onclick = () => startLevel(i); menuGrid.appendChild(btn);
    }

    function showHome() {
        document.getElementById('home-screen').style.display = 'block';
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('end-screen').style.display = 'none';
        window.speechSynthesis.cancel(); isRetryMode = false;
    }

    function startLevel(id) {
        currentLevelId = id;
        let originalQuestions = JSON.parse(JSON.stringify(gameData[id].questions));
        
        let easyQs = originalQuestions.slice(0, 10);
        let hardQs = originalQuestions.slice(10, 20);
        shuffleArray(easyQs); shuffleArray(hardQs);
        levelQuestions = easyQs.concat(hardQs);

        currentQuestionIndex = 0; userAnswers = {}; isRetryMode = false;
        
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('end-screen').style.display = 'none';
        loadQuestion();
    }

    function getScore() {
        let sc = 0;
        for (let i = 0; i < levelQuestions.length; i++) {
            if (userAnswers[i] !== undefined && userAnswers[i] === levelQuestions[i].a) { sc++; }
        }
        return sc;
    }

    function loadQuestion() {
        window.speechSynthesis.cancel(); 
        
        // 隱藏文法提示框
        document.getElementById('hint-box').style.display = 'none';
        
        if (isRetryMode) {
            // 如果是重新挑戰模式，隱藏上一頁按鈕，並將下一頁改為回到總結面板
            document.getElementById('prev-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'inline-block';
            document.getElementById('next-btn').innerText = "🔙 回到總結";
        } else {
            document.getElementById('prev-btn').style.display = 'inline-block';
            document.getElementById('next-btn').style.display = 'inline-block';
            document.getElementById('next-btn').innerText = (currentQuestionIndex === levelQuestions.length - 1) ? "完成關卡 🏁" : "下一頁 ➡️";
        }

        const qData = levelQuestions[currentQuestionIndex];
        
        document.getElementById('progress-text').innerText = `題 ${currentQuestionIndex + 1} / 20`;
        document.getElementById('score-text').innerText = `分數: ${getScore()}`;
        
        const diffBadge = document.getElementById('difficulty-text');
        if (currentQuestionIndex < 10) {
            diffBadge.innerText = "⭐ 淺程度 (1-10)"; diffBadge.style.color = "#0984e3";
        } else {
            diffBadge.innerText = "🔥 深程度 (11-20)"; diffBadge.style.color = "#d63031";
        }

        document.getElementById('question-text').innerText = qData.q;
        const optionsGrid = document.getElementById('options-grid');
        optionsGrid.innerHTML = ''; 

        const answeredIndex = userAnswers[currentQuestionIndex];
        const isAnswered = answeredIndex !== undefined;
        const correctIndex = qData.a;

        qData.o.forEach((optText, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn'; btn.innerText = optText;
            
            if(isAnswered) {
                btn.disabled = true;
                if(index === correctIndex) { btn.classList.add('correct'); } 
                else if (index === answeredIndex && answeredIndex !== correctIndex) { btn.classList.add('wrong'); }
            } else {
                btn.onclick = () => checkAnswer(index, btn);
            }
            optionsGrid.appendChild(btn);
        });

        document.getElementById('prev-btn').disabled = (currentQuestionIndex === 0);
    }

    function checkAnswer(selectedIndex, btnElement) {
        if (userAnswers[currentQuestionIndex] !== undefined) return; 
        
        userAnswers[currentQuestionIndex] = selectedIndex;
        const correctIndex = levelQuestions[currentQuestionIndex].a;

        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);

        if (selectedIndex === correctIndex) {
            btnElement.classList.add('correct', 'correct-anim');
            
            const gameScreen = document.getElementById('game-screen');
            gameScreen.classList.remove('screen-success');
            void gameScreen.offsetWidth; 
            gameScreen.classList.add('screen-success');
            
            playCorrectSound();
            createFallingStars(); 
            document.getElementById('score-text').innerText = `分數: ${getScore()}`;

            // 答對時，1.8秒後自動跳往下一題或結算
            setTimeout(() => {
                if (isRetryMode) {
                    isRetryMode = false; showEndScreen();
                } else {
                    nextQuestion();
                }
            }, 1800);

        } else {
            // 答錯時：顯示正確與錯誤按鈕顏色，播放錯誤音效
            btnElement.classList.add('wrong');
            allBtns[correctIndex].classList.add('correct');
            playWrongSound();
            document.getElementById('score-text').innerText = `分數: ${getScore()}`;

            // 顯示文法提示框 (取消自動跳頁，強迫小朋友閱讀)
            const hintMsg = levelQuestions[currentQuestionIndex].hint || levelHints[currentLevelId];
            document.getElementById('hint-text').innerText = hintMsg;
            document.getElementById('hint-box').style.display = 'block';
            
            // 玩家必須自己按「下一頁」或「回到總結」按鈕
        }
    }

    function prevQuestion() {
        if(currentQuestionIndex > 0) { currentQuestionIndex--; loadQuestion(); }
    }

    function nextQuestion() {
        if (isRetryMode) {
            isRetryMode = false;
            showEndScreen();
        } else {
            if(currentQuestionIndex < levelQuestions.length - 1) {
                currentQuestionIndex++; loadQuestion();
            } else {
                showEndScreen();
            }
        }
    }

    function showEndScreen() {
        window.speechSynthesis.cancel();
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('end-screen').style.display = 'block';
        
        const finalScore = getScore();
        
        // 滿分 20/20 的專屬獎勵
        if (finalScore === 20) {
            document.getElementById('final-score').innerHTML = `🏆 你的分數是：${finalScore} / 20 <br><span style="color:#d63031; font-size:1.5rem; display:block; margin-top:10px;">太棒了！全對滿分！</span>`;
            document.getElementById('star-display').innerText = "🌟🌟🌟🌟🌟";
            playPerfectSound(); createPerfectEffect();
        } else {
            document.getElementById('final-score').innerText = `你的分數是：${finalScore} / 20`;
            let stars = "⭐";
            if (finalScore >= 10) stars = "⭐⭐";
            if (finalScore >= 18) stars = "⭐⭐⭐";
            document.getElementById('star-display').innerText = stars;
        }

        // 總結面板
        const summaryGrid = document.getElementById('summary-grid');
        summaryGrid.innerHTML = '';
        
        for (let i = 0; i < levelQuestions.length; i++) {
            const isCorrect = userAnswers[i] === levelQuestions[i].a;
            const box = document.createElement('div');
            box.className = 'summary-item ' + (isCorrect ? 'summary-correct' : 'summary-wrong');
            box.innerHTML = `題 ${i + 1} <br> ${isCorrect ? '✅' : '❌'}`;
            
            if (!isCorrect) {
                box.onclick = () => retryQuestion(i);
                box.title = "點擊重新挑戰此題！";
            }
            summaryGrid.appendChild(box);
        }
    }

    function retryQuestion(index) {
        isRetryMode = true; currentQuestionIndex = index; delete userAnswers[index];
        document.getElementById('end-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
